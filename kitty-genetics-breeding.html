  :root{
    --ink:#5B4A5E;
    --bg:#F7D3E1;
    --rose-strong:#E7B9CD;
    --mint:#D9EAE1;
    --yellow:#F1E6C6;
    --lavender:#E6DBF1;
    --peach:#F2DFD1;

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{height:100%;}

  body{
    font-family:'Nunito', sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    position:relative;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  #paw-layer{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
  }
  .wander-paw{
    position:absolute;
    display:block;
    color:#FFFFFF;
    opacity:0;
  }

  .center{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:52px;
    position:relative;
    z-index:2;
    padding:40px;
  }

  .title-block{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    border:5px solid #FFFFFF;
    border-radius:28px;
    padding:32px 56px;
  }
  .title-cn{
    font-family:'CatFont', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight:700;
    font-size:3.4rem;
    color:#FFFFFF;
    letter-spacing:6px;
  }
  .title-en{
    font-family:'CatFont', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight:600;
    font-size:1rem;
    letter-spacing:4px;
    text-transform:uppercase;
    color:rgba(255,255,255,0.75);
  }

  .menu{
    display:flex;
    flex-direction:column;
    gap:16px;
    width:280px;
  }
  .menu a{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-family:'CatFont', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    font-weight:400;
    font-size:1.2rem;
    color:var(--ink);
    text-decoration:none;
    padding:16px 0;
    border-radius:999px;
    border:5px solid transparent;
    transition:transform .15s ease, opacity .15s ease, border-color .15s ease;
    letter-spacing:1px;
  }
  .menu a:hover{transform:translateY(-2px); opacity:.88; border-color:#FFFFFF;}
  .menu a:active{transform:translateY(0);}
  .menu a svg{width:20px; height:20px;}

  .menu a.m1{background:var(--rose-strong);}
  .menu a.m2{background:var(--mint);}
  .menu a.m3{background:var(--lavender);}
  .menu a.m4{background:var(--peach);}

  @media (max-width:640px){
    .title-cn{font-size:2.3rem;}
    .center{gap:40px;}
  }

<script>
(function(){
  const layer = document.getElementById('paw-layer');
  if(!layer) return;

  const CHAINS = 3;        // 同时进行的独立脚印链数量
  const STEP = 72;         // 每一步的固定距离(px)
  const CONE = 90;         // 下一步相对上一步朝向的随机角度范围(度)，前方左右各半
  const PAW_SIZE = 42;
  const MARGIN = 40;       // 离屏幕边缘的安全距离，超出则在新位置重新开始
  const FADE_IN = 1800;    // 透明 -> 100% 不透明 的时长(ms)
  const HOLD = 500;        // 完全不透明后的停留时长(ms)
  const FADE_OUT = 1800;   // 变回透明的时长(ms)

  function rand(min, max){ return Math.random() * (max - min) + min; }

  function spawnPaw(x, y, angle){
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 512 512');
    svg.classList.add('wander-paw');
    svg.style.width = PAW_SIZE + 'px';
    svg.style.height = PAW_SIZE + 'px';
    svg.style.left = (x - PAW_SIZE / 2) + 'px';
    svg.style.top = (y - PAW_SIZE / 2) + 'px';
    svg.style.transform = 'rotate(' + angle + 'deg)';
    svg.style.transition = 'opacity ' + FADE_IN + 'ms ease-in-out';

    const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
    use.setAttribute('href', '#paw-icon');
    svg.appendChild(use);
    layer.appendChild(svg);

    // 下一帧再触发，确保 0 -> 1 的过渡能被浏览器捕捉到
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        svg.style.opacity = '1';
      });
    });

    // 完全不透明、停留片刻后，开始变回透明 —— 此刻立即生成下一个脚印
    setTimeout(function(){
      svg.style.transition = 'opacity ' + FADE_OUT + 'ms ease-in-out';
      svg.style.opacity = '0';
      spawnNext(x, y, angle);
    }, FADE_IN + HOLD);

    // 淡出完成后移除节点，避免堆积
    setTimeout(function(){
      svg.remove();
    }, FADE_IN + HOLD + FADE_OUT);
  }

  function spawnNext(x, y, angle){
    let newAngle = angle + rand(-CONE / 2, CONE / 2);
    let nx = x + STEP * Math.sin(newAngle * Math.PI / 180);
    let ny = y - STEP * Math.cos(newAngle * Math.PI / 180);

    const w = window.innerWidth, h = window.innerHeight;
    if(nx < MARGIN || nx > w - MARGIN || ny < MARGIN || ny > h - MARGIN){
      // 走出屏幕范围，就在新的随机位置重新开始一条脚印链
      nx = rand(MARGIN, w - MARGIN);
      ny = rand(MARGIN, h - MARGIN);
      newAngle = rand(0, 360);
    }
    spawnPaw(nx, ny, newAngle);
  }

  for(let i = 0; i < CHAINS; i++){
    setTimeout(function(){
      const w = window.innerWidth, h = window.innerHeight;
      spawnPaw(rand(MARGIN, w - MARGIN), rand(MARGIN, h - MARGIN), rand(0, 360));
    }, i * 500);
  }
})();
</script>

</body>
